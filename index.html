<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    /* ─── CONFIGURAÇÃO ────────────────────────────── */
    const CFG = {
      whatsapp: "5511999038780",
      whatsappDisplay: "(11) 99903-8780",
      message:  "Olá! Vim pelo site e quero saber mais sobre os chatbots e agentes de IA da NeuralBot.",
      email:    "isklikma@gmail.com",
      name:     "NeuralBot",
      city:     "São Paulo, SP",
      hours:    "Seg a Sex — 9h às 19h",
    };
    const wpp = (msg) => `https://wa.me/${CFG.whatsapp}?text=${encodeURIComponent(msg || CFG.message)}`;

    /* ─── HOOK: reveal ao scroll ──────────────────── */
    function useReveal(thresh = 0.1) {
      const ref = useRef(null);
      const [vis, setVis] = useState(false);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting) { setVis(true); obs.unobserve(el); }
        }, { threshold: thresh });
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return [ref, vis];
    }

    /* ─── ÍCONE LUCIDE (otimizado) ────────────────── */
    function Icon({ name, size = 18, color, strokeWidth = 2 }) {
      const ref = useRef(null);
      useEffect(() => {
        if (!ref.current) return;
        ref.current.innerHTML = `<i data-lucide="${name}" style="width:${size}px;height:${size}px;${color?`color:${color};`:''}stroke-width:${strokeWidth}"></i>`;
        if (window.lucide) window.lucide.createIcons({ attrs: { 'stroke-width': strokeWidth } });
      }, [name, size, color, strokeWidth]);
      return <span ref={ref} style={{ display:'inline-flex', alignItems:'center', flexShrink:0, lineHeight:0 }} />;
    }

    /* ─── COMPONENTES UI ──────────────────────────── */
    function SLabel({ icon, children }) {
      return (
        <span style={{
          display:'inline-flex', alignItems:'center', gap:7,
          fontSize:'.72rem', fontWeight:700, letterSpacing:'.12em', textTransform:'uppercase',
          color:'#00d4aa', background:'rgba(0,212,170,.1)',
          border:'1px solid rgba(0,212,170,.28)', padding:'5px 13px',
          borderRadius:100, marginBottom:18,
        }}>
          <Icon name={icon} size={11} color="#00d4aa" /> {children}
        </span>
      );
    }

    function STitle({ children, center }) {
      return (
        <h2 style={{
          fontFamily:"'Syne',sans-serif",
          fontSize:'clamp(1.8rem,3.8vw,2.65rem)',
          fontWeight:800, lineHeight:1.13, marginBottom:13,
          textAlign: center ? 'center' : 'left',
          letterSpacing:'-.01em',
        }}>
          {children}
        </h2>
      );
    }

    const Hi = ({ children }) => <span style={{
      background:'linear-gradient(135deg,#00d4aa,#3b82f6)',
      WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent', backgroundClip:'text',
    }}>{children}</span>;

    function BtnPri({ href, onClick, children, full }) {
      const [h, sH] = useState(false);
      const s = {
        display:'inline-flex', alignItems:'center', justifyContent:'center', gap:9,
        background:'linear-gradient(135deg,#00d4aa,#3b82f6)',
        color:'#040810', fontFamily:"'Syne',sans-serif",
        fontWeight:700, fontSize:'.9rem', padding:'13px 24px',
        borderRadius:15, border:'none', cursor:'pointer',
        transition:'all .25s', textDecoration:'none', whiteSpace:'nowrap',
        width: full ? '100%' : 'auto',
        transform: h ? 'translateY(-2px)' : 'none',
        boxShadow: h ? '0 10px 32px rgba(0,212,170,.35)' : '0 4px 14px rgba(0,212,170,.12)',
      };
      if (href) return <a href={href} target="_blank" rel="noopener noreferrer" style={s} onMouseEnter={()=>sH(true)} onMouseLeave={()=>sH(false)}>{children}</a>;
      return <button onClick={onClick} style={s} onMouseEnter={()=>sH(true)} onMouseLeave={()=>sH(false)}>{children}</button>;
    }

    function BtnOut({ href, children }) {
      const [h, sH] = useState(false);
      return (
        <a href={href} style={{
          display:'inline-flex', alignItems:'center', gap:7,
          background: h ? 'rgba(0,212,170,.08)' : 'transparent',
          color: h ? '#00d4aa' : '#eef2f7',
          fontFamily:"'Syne',sans-serif", fontWeight:600, fontSize:'.9rem',
          padding:'12px 22px', borderRadius:15,
          border: h ? '1px solid rgba(0,212,170,.4)' : '1px solid rgba(255,255,255,.1)',
          cursor:'pointer', transition:'all .25s', textDecoration:'none', whiteSpace:'nowrap',
        }} onMouseEnter={()=>sH(true)} onMouseLeave={()=>sH(false)}>
          {children}
        </a>
      );
    }

    /* ══════════════════════════════════════════════ NAVBAR ══════════════════════════════════════════════ */
    function Navbar() {
      const [scrolled, setScrolled] = useState(false);
      const [open, setOpen] = useState(false);

      useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 40);
        window.addEventListener('scroll', fn, { passive:true });
        return () => window.removeEventListener('scroll', fn);
      }, []);

      useEffect(() => {
        if (!open) return;
        const fn = (e) => { if (!e.target.closest('#navbar-root')) setOpen(false); };
        document.addEventListener('mousedown', fn);
        return () => document.removeEventListener('mousedown', fn);
      }, [open]);

      const links = [
        { l:'Sobre',        h:'#sobre'        },
        { l:'Serviços',     h:'#servicos'     },
        { l:'Como Funciona',h:'#processo'     },
        { l:'Diferenciais', h:'#diferenciais' },
        { l:'FAQ',          h:'#faq'          },
      ];

      return (
        <header id="navbar-root" style={{
          position:'fixed', top:0, left:0, right:0, zIndex:300,
          background: (scrolled || open) ? 'rgba(8,11,16,.97)' : 'transparent',
          backdropFilter: (scrolled || open) ? 'blur(20px)' : 'none',
          WebkitBackdropFilter: (scrolled || open) ? 'blur(20px)' : 'none',
          borderBottom: (scrolled || open) ? '1px solid rgba(255,255,255,.07)' : 'none',
          transition:'background .3s, border .3s',
        }}>
          <div style={{ maxWidth:1180, margin:'0 auto', padding:'0 24px' }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', height:64 }}>
              <a href="#" style={{
                fontFamily:"'Syne',sans-serif", fontSize:'1.2rem', fontWeight:800,
                display:'flex', alignItems:'center', gap:9,
              }}>
                <span style={{
                  width:34, height:34,
                  background:'linear-gradient(135deg,#00d4aa,#3b82f6)',
                  borderRadius:10, display:'flex', alignItems:'center', justifyContent:'center',
                  boxShadow:'0 4px 14px rgba(0,212,170,.35)',
                }}>
                  <Icon name="bot" size={17} color="#040810" />
                </span>
                {CFG.name}
              </a>

              <nav className="desk-nav" style={{ display:'flex', alignItems:'center', gap:2 }}>
                {links.map(l => <NavLink key={l.h} href={l.h}>{l.l}</NavLink>)}
                <a href={wpp()} target="_blank" rel="noopener noreferrer"
                   style={{
                     marginLeft:10, display:'inline-flex', alignItems:'center', gap:7,
                     background:'#00d4aa', color:'#040810',
                     fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:'.82rem',
                     padding:'9px 18px', borderRadius:12,
                     transition:'all .2s', whiteSpace:'nowrap',
                     boxShadow:'0 4px 14px rgba(0,212,170,.2)',
                   }}
                   onMouseEnter={e=>{ e.currentTarget.style.background='#00bfa0'; e.currentTarget.style.transform='translateY(-1px)'; }}
                   onMouseLeave={e=>{ e.currentTarget.style.background='#00d4aa'; e.currentTarget.style.transform='none'; }}>
                  <Icon name="message-circle" size={14} color="#040810" />
                  Orçamento grátis
                </a>
              </nav>

              <button className="mob-toggle"
                      onClick={() => setOpen(v => !v)}
                      aria-label="Abrir menu"
                      style={{
                        display:'none',
                        background:'rgba(255,255,255,.05)',
                        border:'1px solid rgba(255,255,255,.1)',
                        borderRadius:9, padding:8, cursor:'pointer', color:'#eef2f7',
                        alignItems:'center', justifyContent:'center',
                      }}>
                <Icon name={open ? 'x' : 'menu'} size={20} />
              </button>
            </div>

            {open && (
              <div style={{ borderTop:'1px solid rgba(255,255,255,.08)', paddingBottom:16 }}>
                {links.map(l => (
                  <a key={l.h} href={l.h}
                     onClick={() => setOpen(false)}
                     style={{
                       display:'block', padding:'11px 4px',
                       fontSize:'.95rem', fontWeight:500,
                       color:'#c8d0db',
                       borderBottom:'1px solid rgba(255,255,255,.04)',
                       transition:'color .2s, padding-left .2s',
                     }}
                     onMouseEnter={e=>{ e.currentTarget.style.color='#00d4aa'; e.currentTarget.style.paddingLeft='12px'; }}
                     onMouseLeave={e=>{ e.currentTarget.style.color='#c8d0db'; e.currentTarget.style.paddingLeft='4px'; }}>
                    {l.l}
                  </a>
                ))}
                <a href={wpp()} target="_blank" rel="noopener noreferrer"
                   onClick={() => setOpen(false)}
                   style={{
                     display:'flex', alignItems:'center', justifyContent:'center', gap:9,
                     marginTop:14, background:'#00d4aa', color:'#040810',
                     fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:'.95rem',
                     padding:'13px', borderRadius:13,
                   }}>
                  <Icon name="message-circle" size={16} color="#040810" />
                  Falar no WhatsApp
                </a>
              </div>
            )}
          </div>
        </header>
      );
    }

    function NavLink({ href, children }) {
      const [h, sH] = useState(false);
      return (
        <a href={href}
           style={{
             fontSize:'.86rem', fontWeight:500, padding:'7px 13px', borderRadius:8,
             color: h ? '#eef2f7' : '#8a96a8',
             background: h ? 'rgba(255,255,255,.06)' : 'transparent',
             transition:'all .2s',
           }}
           onMouseEnter={()=>sH(true)} onMouseLeave={()=>sH(false)}>
          {children}
        </a>
      );
    }

    /* ══════════════════════════════════════════════ HERO ══════════════════════════════════════════════ */

      return (
        <div style={{

          <div style={{
            background:'linear-gradient(135deg,rgba(0,212,170,.12),rgba(59,130,246,.08))',
            borderBottom:'1px solid rgba(255,255,255,.07)',
            padding:'14px 18px', display:'flex', alignItems:'center', gap:12,
          }}>
            <div style={{ position:'relative' }}>
              <div style={{
                width:40, height:40, borderRadius:'50%',
                background:'linear-gradient(135deg,#00d4aa,#3b82f6)',
                display:'flex', alignItems:'center', justifyContent:'center',
                fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:'.85rem', color:'#040810',
              }}>NB</div>
              <span style={{
                position:'absolute', bottom:1, right:1,

              }} />
            </div>
            <div>
              <div style={{ fontWeight:600, fontSize:'.88rem' }}>NeuralBot Assistant</div>
              <div style={{ fontSize:'.72rem', color:'#00d4aa' }}>● Online agora</div>
            </div>
          </div>
          {/* Messages */}
          <div style={{ padding:'16px 14px', display:'flex', flexDirection:'column', gap:10, background:'#0d1419' }}>
            {msgs.map((m,i)=>(
              <div key={i} style={{ display:'flex', justifyContent: m.from==='user' ? 'flex-end' : 'flex-start' }}>
                <div style={{
                  maxWidth:'78%', padding:'9px 13px', borderRadius: m.from==='user' ? '14px 14px 4px 14px' : '14px 14px 14px 4px',
                  background: m.from==='user' ? 'linear-gradient(135deg,#00d4aa,#3b82f6)' : '#1a2535',
                  color: m.from==='user' ? '#040810' : '#dde4ee',
                  fontSize:'.8rem', lineHeight:1.55, fontWeight: m.from==='user' ? 500 : 400,
                  whiteSpace:'pre-wrap',
                }}>
                  {m.text}
                </div>
              </div>
            ))}
          </div>
          {/* Input */}
          <div style={{
            padding:'12px 14px', borderTop:'1px solid rgba(255,255,255,.06)',
            display:'flex', alignItems:'center', gap:8, background:'#111820',
          }}>
            <div style={{
              flex:1, background:'#0d1419', border:'1px solid rgba(255,255,255,.08)',
              borderRadius:10, padding:'8px 12px', fontSize:'.78rem', color:'#4a5568',
            }}>Digite uma mensagem…</div>
            <div style={{
              width:32, height:32, borderRadius:9,
              background:'linear-gradient(135deg,#00d4aa,#3b82f6)',
              display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0,
            }}>
              <Icon name="send" size={13} color="#040810" />
            </div>
          </div>
        </div>
      );
    }

    function Hero() {
      return (
        <section id="inicio" style={{
          minHeight:'100vh', display:'flex', alignItems:'center',
          padding:'120px 0 80px', position:'relative', overflow:'hidden',
        }}>
          {/* Grid background */}
          <div style={{
            position:'absolute', inset:0,
            backgroundImage:'linear-gradient(rgba(0,212,170,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,170,.035) 1px,transparent 1px)',
            backgroundSize:'60px 60px',
            maskImage:'radial-gradient(ellipse 80% 60% at 50% 40%,black 10%,transparent 100%)',
            WebkitMaskImage:'radial-gradient(ellipse 80% 60% at 50% 40%,black 10%,transparent 100%)',
          }} />
          <div style={{ position:'absolute', width:800, height:800, background:'radial-gradient(circle,rgba(0,212,170,.07) 0%,transparent 65%)', top:-200, left:'30%', transform:'translateX(-50%)', pointerEvents:'none' }} />
          <div style={{ position:'absolute', width:500, height:500, background:'radial-gradient(circle,rgba(59,130,246,.06) 0%,transparent 65%)', bottom:-100, right:-100, pointerEvents:'none' }} />

          <div style={{ maxWidth:1180, margin:'0 auto', padding:'0 24px', position:'relative', zIndex:1, width:'100%' }}>
            <div style={{ display:'grid', gridTemplateColumns:'1fr auto', gap:48, alignItems:'center' }} className="hero-grid">

              {/* Left: text */}
              <div>
                <div className="afd" style={{
                  display:'inline-flex', alignItems:'center', gap:8,
                  background:'rgba(0,212,170,.08)', border:'1px solid rgba(0,212,170,.25)',
                  color:'#00d4aa', fontSize:'.74rem', fontWeight:600,
                  padding:'6px 14px', borderRadius:100, marginBottom:24,
                  letterSpacing:'.04em',
                }}>
                  <span style={{ width:6, height:6, background:'#00d4aa', borderRadius:'50%', animation:'pulse 2s ease-in-out infinite' }} />
                  +200 empresas automatizadas em 2025
                </div>

                <h1 className="afu d1" style={{
                  fontFamily:"'Syne',sans-serif",
                  fontSize:'clamp(2.2rem,5.5vw,4rem)',
                  fontWeight:800, lineHeight:1.08, letterSpacing:'-.025em',
                  marginBottom:22, maxWidth:640,
                }}>
                  Chatbots de IA que <Hi>vendem, atendem</Hi> e qualificam leads 24h por dia
                </h1>

                <p className="afu d2" style={{
                  fontSize:'1.05rem', color:'#8a96a8', lineHeight:1.8, maxWidth:520, marginBottom:36,
                  fontWeight:400,
                }}>
                  Automatize WhatsApp, Instagram e site com agentes de IA sob medida.
                  Entrega em até <strong>7 dias</strong> — sem contratos longos.
                </p>

                <div className="afu d3" style={{ display:'flex', alignItems:'center', gap:12, flexWrap:'wrap', marginBottom:28 }}>

                <div className="afu d4" style={{ display:'flex', alignItems:'center', gap:16, flexWrap:'wrap', fontSize:'.82rem', color:'#8a96a8', marginBottom:44 }}>
                  {[['shield-check','LGPD compliant'],['zap','Entrega em 7 dias'],['refresh-cw','30 dias de suporte']].map(([ic,txt],i)=>(
                    <span key={i} style={{ display:'inline-flex', alignItems:'center', gap:6 }}>
                      <Icon name={ic} size={14} color="#00d4aa" /> {txt}
                    </span>
                  ))}
                </div>

                <div className="afu d4 stats-row" style={{
                  paddingTop:32, borderTop:'1px solid rgba(255,255,255,.07)',
                  display:'flex', alignItems:'flex-start', gap:0, flexWrap:'wrap',
                }}>
                  {[
                    { v:'+200',  l:'Projetos entregues',      accent:false },
                    { v:'98%',   l:'Satisfação dos clientes', accent:true  },
                    { v:'<1min', l:'Tempo de resposta',        accent:true  },
                    { v:'24/7',  l:'Disponibilidade',          accent:false },
